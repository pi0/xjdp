<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
    />
    <title>XJDP Playground</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <script type="importmap">
      {
        "imports": {
          "xjdp": "/dist/index.mjs",
          "xjdp/cli": "/dist/cli/index.mjs",
          "xjdp/cli/web": "/dist/cli/web.mjs",
          "@xterm/xterm": "https://esm.sh/@xterm/xterm@5",
          "@xterm/addon-fit": "https://esm.sh/@xterm/addon-fit@0.10",
          "@xterm/addon-web-links": "https://esm.sh/@xterm/addon-web-links@0.11"
        }
      }
    </script>
    <style>
      @font-face {
        font-family: "Geist Pixel Square";
        src: url("https://cdn.jsdelivr.net/npm/geist@1.7.0/dist/fonts/geist-pixel/GeistPixel-Square.woff2")
          format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #ededed;
        font-family: "Geist Pixel Square", monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 720px;
        width: 100%;
        height: calc(100% - var(--vkb-h, 0px));
        display: flex;
        flex-direction: column;
        container-type: inline-size;
      }
      .banner {
        font-family: monospace;
        color: #ededed;
        font-size: min(0.5rem, 1.7cqi);
        line-height: 1.15;
        margin: 0;
        margin-bottom: 1.5rem;
        text-align: left;
        user-select: none;
        overflow-x: auto;
      }
      @media (max-width: 480px) {
        body {
          padding: 0;
          align-items: flex-start;
        }
        .card {
          padding: 0.35rem 0.5rem 0;
        }
        .banner {
          font-size: min(0.35rem, 1.7cqi);
          margin-bottom: 0.5rem;
          padding: 0 0.5rem;
        }
        .divider {
          margin: 0.35rem 0;
        }
        #terminal {
          border-left: none !important;
          border-right: none !important;
        }
        .card.vkb-open .bottom-section {
          display: none;
        }
      }
      .subtitle {
        display: block;
        color: #666;
        font-size: 0.8rem;
        font-weight: 500;
        text-align: center;
        margin-top: 0.75rem;
        letter-spacing: 0.05em;
        text-decoration: none;
        transition: color 0.15s;
      }
      .subtitle:hover {
        color: #ededed;
      }
      .fingerprint {
        font-family: "Geist Pixel Square", monospace;
        font-size: 0.7rem;
        color: #444;
        text-align: center;
        margin-top: 0.5rem;
        user-select: all;
      }
      .divider {
        border: none;
        border-top: 1px solid #1a1a1a;
        margin: 1.5rem 0;
      }
      .section {
        margin-bottom: 0.75rem;
      }
      .label {
        color: #666;
        font-size: 0.75rem;
        font-weight: 500;
        margin-bottom: 0.4rem;
        padding-left: 0.125rem;
      }
      .cmd {
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        padding: 0.65rem 0.85rem;
        font-family: "Geist Pixel Square", monospace;
        font-size: 0.8rem;
        color: #ededed;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        word-break: break-all;
        transition: border-color 0.2s;
      }
      .cmd {
        cursor: pointer;
      }
      .cmd:hover {
        border-color: #333;
      }
      .cmd code {
        flex: 1;
        user-select: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cmd .hi-bin {
        color: #c678dd;
      }
      .cmd .hi-flag {
        color: #61afef;
      }
      .cmd .hi-val {
        color: #98c379;
      }
      .cmd button {
        background: transparent;
        border: 1px solid #333;
        border-radius: 6px;
        color: #666;
        cursor: pointer;
        padding: 0.3rem 0.6rem;
        font-family: "Geist Pixel Square", monospace;
        font-size: 0.7rem;
        font-weight: 500;
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .cmd button:hover {
        border-color: #555;
        color: #ededed;
      }
      .cmd button.copied {
        color: #ededed;
        border-color: #ededed;
      }
      .code-block {
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        padding: 0.65rem 0.85rem;
        font-family: "Geist Pixel Square", monospace;
        font-size: 0.7rem;
        color: #ededed;
        overflow-x: auto;
        white-space: pre;
        line-height: 1.5;
        position: relative;
      }
      .code-block button {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        background: transparent;
        border: 1px solid #333;
        border-radius: 6px;
        color: #666;
        cursor: pointer;
        padding: 0.3rem 0.6rem;
        font-family: "Geist Pixel Square", monospace;
        font-size: 0.7rem;
        font-weight: 500;
        transition: all 0.15s;
      }
      .code-block button:hover {
        border-color: #555;
        color: #ededed;
      }
      .code-block button.copied {
        color: #ededed;
        border-color: #ededed;
      }
      .code-block .k {
        color: #c678dd;
      }
      .code-block .s {
        color: #98c379;
      }
      .code-block .c {
        color: #555;
      }
      .code-block .f {
        color: #61afef;
      }
      .code-block .v {
        color: #e5c07b;
      }
    </style>
  </head>
  <body>
    <script server>
      const _params = new URL($URL).searchParams;
      const _key = _params.get("key");
      const info = await serverFetch(new URL(`_info${_key ? `?key=${_key}` : ""}`, $URL)).then(res => res.json());
    </script>
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-between">
        <div style="display: flex; align-items: center; gap: 0.5rem">
          XJDP Playground
          <button
            id="music-toggle"
            aria-label="Toggle music"
            style="
              background: transparent;
              border: 1px solid #1a1a1a;
              border-radius: 6px;
              color: #444;
              cursor: pointer;
              padding: 0.3rem 0.6rem;
              font-family: &quot;Geist Pixel Square&quot;, monospace;
              font-size: 0.7rem;
              transition: all 0.2s;
            "
          >
            &#9654;
          </button>
          <button
            id="logout-btn"
            aria-label="Logout"
            style="
              display: none;
              background: transparent;
              border: 1px solid #1a1a1a;
              border-radius: 6px;
              color: #444;
              cursor: pointer;
              padding: 0.3rem 0.6rem;
              font-size: 0.7rem;
              transition: all 0.2s;
            "
          >
            &#x23FB;
          </button>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem">
          <a
            class="subtitle"
            href="https://github.com/pi0/xjdp"
            target="_blank"
            rel="noopener"
            style="margin-top: 0"
            >pi0/xjdp &rarr;</a
          >
        </div>
      </div>
      <hr class="divider" />
      <div
        id="terminal"
        style="width: 100%; flex: 1; min-height: 0; overflow: hidden; border: 1px solid #1a1a1a"
      ></div>
      <div class="bottom-section">
        <hr class="divider" />
        <div class="cmd">
          <code id="cmd-text">{{ _key ? info.cmdFull : info.cmdReadonly }}</code>
          <button onclick="copy(this, event)">Copy</button>
        </div>
        <div class="label" style="text-align: center; margin-top: 0.75rem">Server fingerprint</div>
        <div class="fingerprint">{{ info.serverFingerprint }}</div>
      </div>
    </div>
    <script>
      function copy(btn, e) {
        if (e) e.stopPropagation();
        const cmd = btn.closest(".cmd");
        const text = cmd.querySelector("code").textContent;
        navigator.clipboard.writeText(text);
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 1500);
      }
      function copyCode(btn, e) {
        if (e) e.stopPropagation();
        const block = btn.closest(".code-block");
        const text = block.textContent.replace(/^Copy/, "").trimStart();
        navigator.clipboard.writeText(text);
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 1500);
      }
      document.querySelectorAll(".cmd code").forEach((el) => {
        el.innerHTML = el.textContent
          .replace(/^(\S+)\s+(\S+)/, '<span class="hi-bin">$1 $2</span>')
          .replace(
            /(-\w)\s+(\S+)/g,
            '<span class="hi-flag">$1</span> <span class="hi-val">$2</span>',
          );
      });
      document.querySelectorAll(".cmd").forEach((el) => {
        el.addEventListener("click", () => copy(el.querySelector("button")));
      });
    </script>
    <script type="module">
      import { toggle, isPlaying } from "/music.mjs?2";
      const btn = document.getElementById("music-toggle");

      function updateBtn(on) {
        btn.innerHTML = on ? "&#9646;&#9646;" : "&#9654;";
        btn.style.color = on ? "#ededed" : "#444";
        btn.style.borderColor = on ? "#333" : "#1a1a1a";
      }

      async function play() {
        updateBtn(await toggle(() => updateBtn(false)));
      }

      btn.addEventListener("click", () => {
        play();
      });

      // Auto-pause when tab hidden or window loses focus, resume when back
      let pausedByVisibility = false;
      function handleFocusLost() {
        if (isPlaying()) {
          pausedByVisibility = true;
          play(); // toggle off
        }
      }
      function handleFocusGained() {
        if (pausedByVisibility) {
          pausedByVisibility = false;
          play(); // toggle on
        }
      }
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) handleFocusLost();
        else handleFocusGained();
      });
      window.addEventListener("blur", handleFocusLost);
      window.addEventListener("focus", handleFocusGained);
    </script>
    <script type="module">
      import { createTerminal } from "/terminal.mjs?3";
      const info = <?= JSON.stringify(info) ?>;
      const params = new URLSearchParams(location.search);
      const transport = params.get("transport") || "http";
      const key = params.get("key") || undefined;
      if (key) {
        const btn = document.getElementById("logout-btn");
        btn.style.display = "";
        btn.addEventListener("click", () => {
          const u = new URL(location);
          u.searchParams.delete("key");
          location.href = u;
        });
      }
      createTerminal({
        el: document.getElementById("terminal"),
        url: location.origin,
        key,
        fingerprint: info.serverFingerprint,
        transport,
      });
    </script>
  </body>
</html>
